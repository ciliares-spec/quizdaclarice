<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Teste Clarice</title>
    <style>
        /* DEFINIÇÃO DAS CORES BASEADAS NA IMAGEM DE FUNDO */
        :root {
            --bg-blue: #0077b6;      /* Azul predominante do fundo */
            --text-main: #03045e;    /* Azul escuro para textos */
            --accent-yellow: #ffb703;/* Amarelo dos detalhes da imagem */
            --accent-orange: #fb8500;/* Laranja para botões 3D */
            --success: #2dc653;      /* Verde para acertos */
            --danger: #e63946;       /* Vermelho para erros */
            --panel-bg: rgba(255, 255, 255, 0.92); /* Fundo branco translúcido */
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            /* CONFIGURAÇÃO DA IMAGEM DE FUNDO ENVIADA */
            background-image: url('https://static.vecteezy.com/ti/vetor-gratis/p1/5964663-modelo-de-plano-de-fundo-de-boas-vindas-de-volta-as-aulas-material-escolar-em-fundo-azul-vetor.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        /* CONTAINER PRINCIPAL CENTRALIZADO */
        #game-outer {
            width: 100%;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Leve escurecimento para destacar o painel */
            background-color: rgba(0, 0, 0, 0.2); 
        }

        #game-container {
            background: var(--panel-bg);
            padding: 2.5rem;
            border-radius: 25px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
            width: 95%;
            max-width: 650px;
            text-align: center;
            /* Borda usando o azul escuro da imagem */
            border: 6px solid var(--text-main); 
            position: relative;
        }

        /* PLACAR AO VIVO */
        .live-score {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        .score-box {
            padding: 8px 18px;
            border-radius: 12px;
            font-weight: bold;
            color: white;
            font-size: 0.9rem;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
        }
        .correct-box { background: var(--success); }
        .wrong-box { background: var(--danger); }

        /* BARRA DE TEMPO CENTRALIZADA */
        .timer-wrapper {
            margin: 15px auto 25px;
            width: 80%;
        }
        .timer-container {
            height: 16px;
            background: #caf0f8; /* Azul muito claro */
            border-radius: 20px;
            border: 3px solid var(--text-main);
            overflow: hidden;
        }
        #timer-bar {
            height: 100%;
            background: var(--accent-yellow); /* Amarelo da imagem */
            width: 100%;
            transition: width 1s linear;
        }

        /* TEXTO DA PERGUNTA */
        .question {
            font-size: 1.4rem;
            margin: 25px 0;
            color: var(--text-main);
            font-weight: bold;
            line-height: 1.4;
            min-height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* GRADE DE OPÇÕES */
        .options-grid {
            display: grid;
            gap: 15px;
        }

        /* BOTÕES COM APARÊNCIA 3D USANDO O LARANJA DA IMAGEM */
        .btn-3d {
            padding: 16px;
            font-size: 1.1rem;
            font-weight: bold;
            color: white;
            background: var(--accent-orange);
            border: none;
            border-radius: 15px;
            cursor: pointer;
            position: relative;
            /* Sombra escura do 3D */
            box-shadow: 0 6px 0 #a35600; 
            transition: all 0.1s;
        }

        .btn-3d:hover:not([disabled]) {
            background: #ff9f43;
            transform: translateY(-2px);
            box-shadow: 0 8px 0 #a35600;
        }

        .btn-3d:active:not([disabled]) {
            transform: translateY(4px);
            box-shadow: 0 2px 0 #a35600;
        }

        /* Estilos desativados (revelação da resposta) */
        .btn-3d.correct {
            background: var(--success) !important;
            box-shadow: 0 6px 0 #1e8449 !important;
        }

        .btn-3d.wrong {
            background: var(--danger) !important;
            box-shadow: 0 6px 0 #a93226 !important;
        }

        /* BADGE DA MATÉRIA */
        .category-badge {
            background: var(--text-main);
            color: white;
            padding: 6px 20px;
            border-radius: 8px;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 0.8rem;
        }

        /* BOTÃO DE INICIAR ESPECIAL */
        #start-btn {
            background: var(--success);
            box-shadow: 0 6px 0 #1e8449;
            font-size: 1.6rem;
            padding: 20px 50px;
            margin-top: 30px;
        }

        /* Esconder telas inativas */
        #score-screen, #start-screen { display: none; }
        .active { display: block !important; }
    </style>
</head>
<body>

    <div id="game-outer">
        <div id="game-container">
            <div id="start-screen" class="active">
                <h1 style="color: var(--text-main); font-size: 3rem; margin-top: 0; margin-bottom: 10px;">Quiz Teste Clarice</h1>
             
                <p style="font-size: 1.3rem; color: var(--text-main); margin-top: 25px;">Desafio de <strong>Inglês</strong> e <strong>História</strong><br>Você tem 20 segundos por questão!</p>
                <button id="start-btn" class="btn-3d" onclick="startGame()">VAMOS LÁ!</button>
            </div>

            <div id="quiz-screen" style="display:none">
                <div class="live-score">
                    <div class="score-box correct style="display:none">
                <div class="live-score">
                    <div class="score-box correctass="score-box correctscore-box correct
